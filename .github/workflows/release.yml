---
name: Release

on:
  push:
    tags: [ "*" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04
    steps:
      - name: Set up cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up toolchain
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
        id: go
      - name: Build binary
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          go tool mage -compile ./mage-bin
          CGO_ENABLED=1 GOARCH=amd64 ./mage-bin -v go:build
          mv ghostunnel ghostunnel-linux-amd64
          CGO_ENABLED=1 GOARCH=arm64 CC=aarch64-linux-gnu-gcc ./mage-bin -v go:build
          mv ghostunnel ghostunnel-linux-arm64
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ghostunnel-linux-amd64
          path: ghostunnel-linux-amd64
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ghostunnel-linux-arm64
          path: ghostunnel-linux-arm64

  build-darwin:
    name: Build (MacOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up toolchain
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
        id: go
      - name: Build binary
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          go tool mage -compile ./mage-bin
          CGO_ENABLED=1 GOARCH=amd64 ./mage-bin -v go:build
          mv ghostunnel ghostunnel-darwin-amd64
          CGO_ENABLED=1 GOARCH=arm64 ./mage-bin -v go:build
          mv ghostunnel ghostunnel-darwin-arm64
          lipo -create -output ghostunnel-darwin-universal ghostunnel-darwin-amd64 ghostunnel-darwin-arm64
      - name: Codesign binaries
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          CODESIGN_CERTIFICATE: ${{ secrets.CODESIGN_CERTIFICATE }}
          CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.CODESIGN_CERTIFICATE_PASSWORD }}
        run: |
          ./mage-bin -v apple:codesign ghostunnel-darwin-amd64
          ./mage-bin -v apple:codesign ghostunnel-darwin-arm64
          ./mage-bin -v apple:codesign ghostunnel-darwin-universal
      - name: Notarize binaries
        env:
          NOTARIZE_ISSUER_ID: ${{ secrets.NOTARIZE_ISSUER_ID }}
          NOTARIZE_KEY_ID: ${{ secrets.NOTARIZE_KEY_ID }}
          NOTARIZE_KEY: ${{ secrets.NOTARIZE_KEY }}
        run: |
          ./mage-bin -v apple:notarize ghostunnel-darwin-amd64
          ./mage-bin -v apple:notarize ghostunnel-darwin-arm64
          ./mage-bin -v apple:notarize ghostunnel-darwin-universal
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ghostunnel-darwin-amd64
          path: ghostunnel-darwin-amd64
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ghostunnel-darwin-arm64
          path: ghostunnel-darwin-arm64
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ghostunnel-darwin-universal
          path: ghostunnel-darwin-universal

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up toolchain
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
        id: go
      - name: Build binary
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          go tool mage -v go:build
          mv ghostunnel ghostunnel-windows-amd64.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ghostunnel-windows-amd64.exe
          path: ghostunnel-windows-amd64.exe

  release:
    name: Create release
    runs-on: ubuntu-24.04
    needs: [ build-linux, build-darwin, build-windows ]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go tool mage -v github:publish ${{ github.ref_name }}
