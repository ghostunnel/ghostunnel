---
name: Test 
permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    name: Tests
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
        id: go
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.x'
      - name: Install test dependencies (Linux)
        if: contains(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y default-jre-headless
      - name: Run tests
        run: go tool mage -v test:all
      - name: Codecov upload
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/all.profile
          flags: ${{ contains(matrix.os, 'ubuntu') && 'linux' || (contains(matrix.os, 'macos') && 'darwin' || 'windows') }}
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      
  test-freebsd:
    name: Tests (FreeBSD)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run tests in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: '14.3'
          usesh: true
          prepare: |
            pkg install -y go python3
          run: |
            go version
            python3 --version
            go tool mage -v test:all
      - name: Codecov upload
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/all.profile
          flags: freebsd
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-docker:
    name: Tests (PKCS#11/SoftHSM)
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: Run tests in Docker
        run: go tool mage -v test:docker
      - name: Codecov upload
        uses: codecov/codecov-action@v6
        if: ${{ github.actor != 'dependabot[bot]' }}
        with:
          files: ./coverage/all.profile
          flags: linux
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
