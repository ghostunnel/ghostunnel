---
name: Lint

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  golangci:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: golangci-lint
        run: go tool mage go:lint
