version: "2"

linters:
  # Use default linters (errcheck, govet, ineffassign, staticcheck, unused)
  default: standard
  # forbidigo bans a couple of project-specific footgun calls; see the
  # per-pattern messages under settings.forbidigo for the rationale.
  # errorlint enforces errors.Is comparisons and %w wrapping — the core
  # rules from the logging/error-message conventions.
  # perfsprint catches fmt.Errorf with no format args (use errors.New instead).
  # errname reinforces the sentinel-error naming convention (errXxx / XxxError).
  # The remaining linters are correctness guards (nilerr, bodyclose,
  # durationcheck, makezero, reassign, predeclared, wastedassign) and small
  # modernization/cleanup checks (usestdlibvars, unconvert, whitespace,
  # intrange, copyloopvar, misspell), most of which are currently clean.
  enable:
    - forbidigo
    - errorlint
    - perfsprint
    - errname
    - usestdlibvars
    - nilerr
    - bodyclose
    - durationcheck
    - makezero
    - reassign
    - predeclared
    - wastedassign
    - unconvert
    - whitespace
    - intrange
    - copyloopvar
    - misspell
  # Enable human-readable exclusion presets including std-error-handling
  # which excludes common error handling patterns like Close()
  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      # Ignore errcheck in test files - test code often has best-effort operations
      - linters:
          - errcheck
        path: "_test\\.go"
      # Ignore forbidigo in test files - tests legitimately call os.Exit (e.g.
      # TestMain) and may tune runtime.GOMAXPROCS; the footguns the rules guard
      # against only matter in the production binary.
      - linters:
          - forbidigo
        path: "_test\\.go"
  settings:
    errcheck:
      # Additional functions to exclude from checking
      exclude-functions:
        - (*github.com/ghostunnel/ghostunnel/certloader.spiffeTLSConfigSource).Close
    errorlint:
      # Flag fmt.Errorf with %v (or %s) wrapping an error — must use %w.
      errorf: true
      errorf-multi: true
      # Flag == / != comparisons against sentinel errors — must use errors.Is.
      comparison: true
      # Assertion checks add noise on legitimately-typed error values; keep off.
      asserts: false
    perfsprint:
      # Only flag fmt.Errorf with no format args — errors.New is preferred.
      # All other perfsprint checks (sprintf1, strconcat, int-conversion,
      # err-error) are disabled to avoid unrelated churn.
      errorf: true
      sprintf1: false
      strconcat: false
      int-conversion: false
      err-error: false
    forbidigo:
      forbid:
        - pattern: '^runtime\.GOMAXPROCS$'
          msg: >-
            Do not call runtime.GOMAXPROCS. Go 1.25+ defaults GOMAXPROCS to the
            cgroup CPU quota and updates it dynamically; an explicit call
            disables both and overrides the GOMAXPROCS env var. Honor the
            GOMAXPROCS environment variable instead.
        - pattern: '^os\.Exit$'
          msg: >-
            Do not call os.Exit directly; use exitFunc instead. exitFunc is
            wrapped (see coverage_enabled.go) to flush coverage counters before
            the process exits, and routing exits through it keeps shutdown
            graceful. A raw os.Exit bypasses both.
